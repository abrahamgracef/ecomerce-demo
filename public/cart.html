<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart - ShopHub</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/cart.css" />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <div class="navbar-container">
        <div class="logo">
          <h1>🛍️ ShopHub</h1>
        </div>
        <div class="nav-links">
          <a href="index.html" class="nav-link">Home</a>
          <a href="index.html#products" class="nav-link">Products</a>
          <a href="cart.html" class="nav-link active"
            >Cart <span id="cart-count" class="cart-badge">0</span></a
          >
          <div class="auth-links">
            <a href="#" id="profile-link" class="nav-link" style="display: none"
              >Profile</a
            >
            <a
              href="order-history.html"
              id="orders-link"
              class="nav-link"
              style="display: none"
              >Orders</a
            >
            <a href="#" id="logout-link" class="nav-link" style="display: none"
              >Logout</a
            >
            <a href="auth.html" id="login-link" class="nav-link">Login</a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Cart Container -->
    <div class="container">
      <div class="cart-wrapper">
        <div class="cart-section">
          <h2>Shopping Cart</h2>
          <div id="cart-items" class="cart-items">
            <!-- Cart items will be loaded here -->
          </div>
        </div>

        <div id="checkout-section" class="checkout-section">
          <div id="cart-summary" class="cart-summary">
            <!-- Summary will be loaded here -->
          </div>

          <div class="checkout-form">
            <h3>Checkout</h3>
            <form id="checkout-form">
              <div class="form-group">
                <label for="recipient-name">Full Name</label>
                <input
                  type="text"
                  id="recipient-name"
                  placeholder="John Doe"
                  required
                />
              </div>

              <div class="form-group">
                <label for="phone">Phone Number</label>
                <input
                  type="tel"
                  id="phone"
                  placeholder="+1-800-SHOP-HUB"
                  required
                />
              </div>

              <div class="form-group">
                <label for="shipping-address">Shipping Address</label>
                <textarea
                  id="shipping-address"
                  placeholder="123 Main St, City, State, ZIP"
                  required
                ></textarea>
              </div>

              <button
                type="button"
                id="checkout-btn"
                class="btn btn-primary btn-checkout"
              >
                Complete Purchase
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <p>&copy; 2024 ShopHub. All rights reserved.</p>
        <p>Contact: support@shophub.com | Phone: +1-800-SHOP-HUB</p>
      </div>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
  </body>
</html>
