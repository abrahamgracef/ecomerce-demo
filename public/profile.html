<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - ShopHub</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <style>
      .profile-container {
        max-width: 800px;
        margin: 40px auto;
        padding: 20px;
      }

      .profile-header {
        text-align: center;
        margin-bottom: 40px;
      }

      .profile-card {
        background: white;
        border-radius: 10px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        padding: 30px;
        margin-bottom: 30px;
      }

      .profile-avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 40px;
        color: white;
      }

      .profile-form .form-group {
        margin-bottom: 20px;
      }

      .profile-form label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
        color: #333;
      }

      .profile-form input {
        width: 100%;
        padding: 12px;
        border: 2px solid #e1e5e9;
        border-radius: 5px;
        font-size: 16px;
        transition: border-color 0.3s;
      }

      .profile-form input:focus {
        outline: none;
        border-color: #667eea;
      }

      .btn-save {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        transition: transform 0.2s;
      }

      .btn-save:hover {
        transform: translateY(-2px);
      }

      .btn-save:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .orders-section h3 {
        color: #333;
        margin-bottom: 20px;
        border-bottom: 2px solid #667eea;
        padding-bottom: 10px;
      }

      .order-item {
        border: 1px solid #e1e5e9;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 15px;
        background: #f8f9fa;
      }

      .order-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .order-number {
        font-weight: 600;
        color: #667eea;
      }

      .order-status {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
      }

      .order-status.pending {
        background: #fff3cd;
        color: #856404;
      }

      .order-status.processing {
        background: #cce5ff;
        color: #004085;
      }

      .order-status.shipped {
        background: #d1ecf1;
        color: #0c5460;
      }

      .order-status.delivered {
        background: #d4edda;
        color: #155724;
      }

      .order-details {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        font-size: 14px;
        color: #666;
      }

      .order-items {
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid #e1e5e9;
      }

      .order-item-detail {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border-bottom: 1px solid #f0f0f0;
      }

      .order-item-detail:last-child {
        border-bottom: none;
      }

      .loading {
        text-align: center;
        padding: 40px;
        color: #666;
      }

      .error {
        background: #f8d7da;
        color: #721c24;
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 20px;
        border: 1px solid #f5c6cb;
      }

      .success {
        background: #d4edda;
        color: #155724;
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 20px;
        border: 1px solid #c3e6cb;
      }

      @media (max-width: 768px) {
        .profile-container {
          margin: 20px;
          padding: 10px;
        }

        .order-details {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <div class="navbar-container">
        <div class="logo">
          <h1>🛍️ ShopHub</h1>
        </div>
        <div class="nav-links">
          <a href="index.html" class="nav-link">Home</a>
          <a href="index.html#products" class="nav-link">Products</a>
          <a href="cart.html" class="nav-link"
            >Cart <span id="cart-count" class="cart-badge">0</span></a
          >
          <div class="auth-links">
            <a href="profile.html" id="profile-link" class="nav-link active"
              >Profile</a
            >
            <a
              href="order-history.html"
              id="orders-link"
              class="nav-link"
              style="display: none"
              >Orders</a
            >
            <a href="#" id="logout-link" class="nav-link">Logout</a>
            <a
              href="auth.html"
              id="login-link"
              class="nav-link"
              style="display: none"
              >Login</a
            >
          </div>
        </div>
      </div>
    </nav>

    <!-- Profile Container -->
    <div class="profile-container">
      <div class="profile-header">
        <h1>My Profile</h1>
        <p>Manage your account information and view your order history</p>
      </div>

      <!-- Profile Information -->
      <div class="profile-card">
        <div class="profile-avatar">👤</div>
        <h2 style="text-align: center; margin-bottom: 30px">
          Account Information
        </h2>

        <div id="profile-message"></div>

        <form id="profile-form" class="profile-form">
          <div class="form-group">
            <label for="profile-name">Full Name</label>
            <input
              type="text"
              id="profile-name"
              placeholder="Your full name"
              required
            />
          </div>

          <div class="form-group">
            <label for="profile-email">Email Address</label>
            <input
              type="email"
              id="profile-email"
              placeholder="your@email.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="profile-phone">Phone Number</label>
            <input
              type="tel"
              id="profile-phone"
              placeholder="Your phone number"
            />
          </div>

          <div class="form-group">
            <label for="profile-address">Shipping Address</label>
            <input
              type="text"
              id="profile-address"
              placeholder="Your shipping address"
            />
          </div>

          <button type="submit" class="btn-save" id="save-btn">
            Save Changes
          </button>
        </form>
      </div>

      <!-- Order History -->
      <div class="profile-card">
        <h3>Order History</h3>
        <div id="orders-container">
          <div class="loading">Loading your orders...</div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <p>&copy; 2024 ShopHub. All rights reserved.</p>
        <p>Contact: support@shophub.com | Phone: +1-800-SHOP-HUB</p>
      </div>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/profile.js"></script>
  </body>
</html>
